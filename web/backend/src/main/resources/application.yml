spring:
  application:
    name: convertly-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:convertly;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${PORT:8080}

convertly:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*,http://0.0.0.0:*,http://192.168.*.*:*}
  ai:
    api-key: ${GROQ_API_KEY:}
    api-url: ${AI_API_URL:https://api.groq.com/openai/v1/chat/completions}
    model: ${AI_MODEL:llama-3.1-8b-instant}
  interpreter:
    host: ${INTERPRETER_HOST:127.0.0.1}
    port: ${INTERPRETER_PORT:7878}
    timeout: ${INTERPRETER_TIMEOUT:PT15S}
    max-frame-bytes: ${INTERPRETER_MAX_FRAME_BYTES:4194304}
  jwt:
    secret: ${JWT_SECRET:convertly-local-development-jwt-secret-change-me}
    expires-in: ${JWT_EXPIRES_IN:PT2H}
